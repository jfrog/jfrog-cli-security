      - name: Install and Setup Dependencies
        uses: ./.github/actions/install-and-setup

      # Test
      - name: Run tests
        run: go test ${{ env.GO_COMMON_TEST_ARGS }} --test.artifactory --ci.runId=${{ runner.os }}-sec-test
    
